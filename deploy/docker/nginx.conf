server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # RAG endpoint — Docker 无 Pages Function，返回空结果避免 404
    # 客户端 ai-chat.js 收到空 results 会自动降级（仅用当前文章上下文）
    location = /rag-query {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"results":[],"source":"nginx-fallback"}';
    }

    # MkDocs search index
    location ~* search_index\.json$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Handle trailing slash URLs without redirect (prevents port change)
    # /ch01-001-xxx/ → serve /ch01-001-xxx.html directly
    location ~ ^(.+)/$ {
        try_files $1 $1.html $1/index.html =404;
    }

    # Clean URLs: try .html first, then index.html
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
