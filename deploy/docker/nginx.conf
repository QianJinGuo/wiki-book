server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # MkDocs search index
    location ~* search_index\.json$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Handle trailing slash URLs without redirect (prevents port change)
    # /ch01-001-xxx/ → serve /ch01-001-xxx.html directly
    location ~ ^(.+)/$ {
        try_files $1 $1.html $1/index.html =404;
    }

    # Clean URLs: try .html first, then index.html
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
