site_name: "AI 第一书：从入门到大师"
site_description: "全球第一部基于 2784 篇一手 AI 材料系统编撰的开源读物"
repo_url: "https://github.com/QianJinGuo/wiki"
repo_name: "QianJinGuo/wiki"

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - styles.css

nav:
  - 首页: index.md
  - 第一篇 · 入门篇:
    - Ch01 AI 与 LLM 基础: ch01-ai-basics.md
    - Ch02 提示词工程与上下文工程: ch02-prompt.md
    - Ch03 AI 工具与产品全景: ch03-ai-tools.md
  - 第二篇 · 工程师篇:
    - Ch04 Agent 核心架构: ch04-agent-core.md
    - Ch05 Harness 工程: ch05-harness.md
    - Ch06 记忆与上下文管理: ch06-memory.md
    - Ch07 技能、工具与 MCP: ch07-skill-tool.md
    - Ch08 多 Agent 协作: ch08-multi-agent.md
    - Ch09 AI 编程与代码生成: ch09-ai-coding.md
    - Ch10 RAG 与知识检索: ch10-rag.md
  - 第三篇 · 专家篇:
    - Ch11 云基础设施与部署: ch11-infra.md
    - Ch12 安全与治理: ch12-security.md
    - Ch13 MLOps 与评估: ch13-mlops.md
    - Ch14 数据工程: ch14-data.md
  - 第四篇 · 科学家篇:
    - Ch15 训练与微调: ch15-training.md
    - Ch16 推理优化与架构: ch16-inference.md
    - Ch17 多模态与生成: ch17-multimodal.md
    - Ch18 机器人与具身智能: ch18-robotics.md
  - 第五篇 · 大师篇:
    - Ch19 前沿研究与理论: ch19-research-frontier.md
    - Ch20 AI 哲学、安全与未来: ch20-ai-philosophy.md
